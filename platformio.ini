; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:genericSTM32F401RC]
platform = ststm32
board = genericSTM32F401RC
framework = stm32cube
build_flags =
	-I./src/cubemx/inc
	-I./src/cubemx/USB_DEVICE/App
	-I./src/cubemx/USB_DEVICE/Target
	-D MONITOR_TASK=0
	-D UART_DEBUG=0
	-D MODBUS_SLAVE_STACK_SIZE=2048
	-D NUM_SWITCHES=12
	-D NUM_RELAYS=8
	; --- Switch-to-Relay Mapping ---
	; Формат: -D SWITCH_<N>_RELAY=<relay_number>  (номера выключателей и реле — от 1)
	; Выключатели 1-8 → реле 1-8 (1:1, можно не указывать)
	; Дополнительные выключатели — обязательно задать явно:
	-D SWITCH_9_RELAY=3
	-D SWITCH_10_RELAY=2
	-D SWITCH_11_RELAY=3
	-D SWITCH_12_RELAY=2
debug_build_flags =
	-D FREERTOS
	${env.build_flags}
monitor_speed = 115200
debug_tool = stlink
upload_protocol = dfu